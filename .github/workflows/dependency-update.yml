name: Dependency Update

on:
  schedule:
    # Run every Monday at 9 AM UTC
    - cron: '0 9 * * 1'
  workflow_dispatch:

env:
  DOTNET_VERSION: '8.0.x'
  SOLUTION_PATH: 'src/frontend/FinTrack.sln'

jobs:
  update-dependencies:
    runs-on: self-hosted
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v4
      with:
        token: ${{ secrets.GITHUB_TOKEN }}

    - name: Setup .NET
      uses: actions/setup-dotnet@v4
      with:
        dotnet-version: ${{ env.DOTNET_VERSION }}
        dotnet-install-dir: ${{ runner.temp }}/dotnet
      env:
        DOTNET_INSTALL_DIR: ${{ runner.temp }}/dotnet

    - name: Install .NET MAUI workload
      run: dotnet workload install maui

    - name: Install dotnet outdated tool
      run: dotnet tool install --global dotnet-outdated-tool

    - name: Check for outdated packages
      id: outdated
      run: |
        cd src/frontend
        dotnet outdated --output json > outdated-packages.json
        
        # Check if there are any outdated packages
        if [ -s outdated-packages.json ] && [ "$(cat outdated-packages.json)" != "[]" ]; then
          echo "has_updates=true" >> $GITHUB_OUTPUT
        else
          echo "has_updates=false" >> $GITHUB_OUTPUT
        fi

    - name: Update packages
      if: steps.outdated.outputs.has_updates == 'true'
      run: |
        cd src/frontend
        
        # Update minor and patch versions only (safer updates)
        dotnet outdated --upgrade --version-lock Major
        
        # Restore and build to ensure everything still works
        dotnet restore ${{ env.SOLUTION_PATH }}
        dotnet build ${{ env.SOLUTION_PATH }} --configuration Release

    - name: Run tests after update
      if: steps.outdated.outputs.has_updates == 'true'
      run: |
        dotnet test src/frontend/FinTrack.Tests.Unit/FinTrack.Tests.Unit.csproj --configuration Release --no-build
        dotnet test src/frontend/FinTrack.Tests.Integration/FinTrack.Tests.Integration.csproj --configuration Release --no-build

    - name: Create Pull Request
      if: steps.outdated.outputs.has_updates == 'true'
      uses: peter-evans/create-pull-request@v5
      with:
        token: ${{ secrets.GITHUB_TOKEN }}
        commit-message: 'chore: update NuGet packages'
        title: 'chore: Update NuGet packages'
        body: |
          ## 📦 Dependency Updates
          
          This PR contains automatic updates to NuGet packages.
          
          ### Changes
          - Updated packages to their latest minor/patch versions
          - All tests are passing
          - No breaking changes expected
          
          ### Verification
          - ✅ Build successful
          - ✅ Unit tests passing
          - ✅ Integration tests passing
          
          Please review the changes and merge if everything looks good.
          
          ---
          *This PR was created automatically by the dependency update workflow.*
        branch: chore/update-dependencies
        delete-branch: true
        labels: |
          dependencies
          automated
        reviewers: |
          # Add your GitHub usernames here for automatic review assignment
        draft: false

    - name: Upload outdated packages report
      if: always()
      uses: actions/upload-artifact@v4
      with:
        name: outdated-packages-report
        path: src/frontend/outdated-packages.json
        retention-days: 30